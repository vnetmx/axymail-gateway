<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Admin{% endblock %} — axymail-gateway</title>
  <style>
    :root {
      --bg:          #0d1117;
      --surface:     #1a1a2e;
      --surface-2:   #16213e;
      --border:      #1e2a3a;
      --border-2:    #243447;
      --nav-bg:      #0f3460;
      --accent:      #4a90d9;
      --accent-dim:  rgba(74,144,217,.15);
      --accent-ring: rgba(74,144,217,.25);
      --danger:      #e94560;
      --danger-dim:  rgba(233,69,96,.15);
      --success:     #34d399;
      --success-dim: rgba(52,211,153,.12);
      --warning:     #f59e0b;
      --text:        #e6edf3;
      --muted:       #7d8590;
      --muted-2:     #4a5568;
      --radius:      8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted-2); }

    /* ── Top nav ── */
    .topnav {
      background: var(--nav-bg);
      height: 56px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,.06);
      box-shadow: 0 2px 16px rgba(0,0,0,.4);
    }
    .nav-left { display: flex; align-items: center; gap: 28px; }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      letter-spacing: -0.2px;
    }
    .nav-logo { font-size: 22px; line-height: 1; }
    .nav-badge {
      background: rgba(74,144,217,.2);
      color: #93c5fd;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid rgba(74,144,217,.4);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .nav-tabs { display: flex; gap: 4px; }
    .nav-tab {
      color: rgba(255,255,255,.65);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 6px;
      transition: background .15s, color .15s;
    }
    .nav-tab:hover { background: rgba(255,255,255,.08); color: #fff; }
    .nav-tab.active { background: rgba(255,255,255,.12); color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 8px; }

    /* ── Container ── */
    .container {
      max-width: 1080px;
      margin: 32px auto;
      padding: 0 28px;
    }

    /* ── Page header ── */
    .page-header { margin-bottom: 28px; }
    .page-title { font-size: 20px; font-weight: 700; color: var(--text); }
    .page-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      transition: border-color .15s;
    }
    .stat-card:hover { border-color: var(--border-2); }
    .stat-value {
      font-size: 30px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 24px;
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .card-body { padding: 20px; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 11px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr { transition: background .1s; }
    tbody tr:hover td { background: rgba(255,255,255,.025); }

    .mono {
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      font-size: 11.5px;
      color: var(--muted);
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }
    .badge-blue  { background: var(--accent-dim);   color: var(--accent);  border: 1px solid rgba(74,144,217,.3); }
    .badge-green { background: var(--success-dim);  color: var(--success); border: 1px solid rgba(52,211,153,.3); }
    .badge-red   { background: var(--danger-dim);   color: var(--danger);  border: 1px solid rgba(233,69,96,.3); }
    .badge-gray  { background: rgba(125,133,144,.1); color: var(--muted);  border: 1px solid rgba(125,133,144,.2); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      text-decoration: none;
      white-space: nowrap;
      transition: background .12s, border-color .12s, opacity .12s, transform .1s;
      letter-spacing: 0.1px;
    }
    .btn:active { transform: scale(0.98); }
    .btn-sm { padding: 4px 11px; font-size: 12px; }
    .btn-block { width: 100%; justify-content: center; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover { background: #3a7bc8; border-color: #3a7bc8; }

    .btn-danger {
      background: var(--danger-dim);
      color: var(--danger);
      border-color: rgba(233,69,96,.35);
    }
    .btn-danger:hover { background: rgba(233,69,96,.25); }

    .btn-ghost {
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.75);
      border-color: rgba(255,255,255,.08);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.1); color: #fff; }

    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border-color: var(--border-2);
    }
    .btn-secondary:hover { background: var(--border); }

    /* ── Alerts / Flash ── */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      font-size: 13px;
      border: 1px solid transparent;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .alert-success { background: var(--success-dim); color: var(--success); border-color: rgba(52,211,153,.3); }
    .alert-error   { background: var(--danger-dim);  color: var(--danger);  border-color: rgba(233,69,96,.3); }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-grid.cols-1 { grid-template-columns: 1fr; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

    .form-group { margin-bottom: 0; }
    .form-group.span-2 { grid-column: span 2; }
    @media (max-width: 600px) { .form-group.span-2 { grid-column: span 1; } }

    .form-label {
      display: block;
      font-weight: 600;
      font-size: 12px;
      margin-bottom: 6px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input, .form-select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border-2);
      border-radius: 6px;
      font-size: 13px;
      background: var(--surface-2);
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    .form-input::placeholder { color: var(--muted-2); }
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-ring);
    }
    .form-hint {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 5px;
      line-height: 1.4;
    }
    .form-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      padding-top: 4px;
    }

    /* ── Collapsible add-form panel ── */
    .add-panel {
      border-top: 1px solid var(--border);
      padding: 20px;
      background: rgba(74,144,217,.04);
      display: none;
    }
    .add-panel.open { display: block; }
    .add-panel-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--accent);
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 52px 24px;
      color: var(--muted);
    }
    .empty-state-icon { font-size: 36px; margin-bottom: 12px; opacity: .6; }
    .empty-state-text { font-size: 14px; }

    /* ── Login page ── */
    .login-wrap {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-icon { font-size: 44px; display: block; margin-bottom: 14px; }
    .login-title { font-size: 20px; font-weight: 800; color: var(--text); }
    .login-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* ── Confirm (delete) ── */
    .confirm-box {
      background: var(--surface);
      border: 1px solid rgba(233,69,96,.3);
      border-radius: var(--radius);
      overflow: hidden;
      max-width: 580px;
    }
    .confirm-header {
      background: var(--danger-dim);
      border-bottom: 1px solid rgba(233,69,96,.2);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .confirm-header-title { font-size: 15px; font-weight: 700; color: var(--danger); }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .detail-table td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .detail-table tr:last-child td { border-bottom: none; }
    .detail-table td:first-child {
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      width: 130px;
    }

    /* ── Provider name pill ── */
    .provider-slug {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 12px;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid rgba(74,144,217,.25);
    }

    /* ── Utilities ── */
    .text-muted  { color: var(--muted); }
    .text-danger { color: var(--danger); }
    .text-accent { color: var(--accent); }
    .flex { display: flex; }
    .gap-2 { gap: 8px; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .w-full { width: 100%; }
    .mt-4 { margin-top: 16px; }
    code {
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: ui-monospace, Consolas, monospace;
      font-size: 11.5px;
      color: #93c5fd;
    }
    .masked {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .truncate {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
      vertical-align: middle;
    }
  </style>
</head>
<body>

{% block nav %}
<nav class="topnav">
  <div class="nav-left">
    <a class="nav-brand" href="/admin/">
      <span class="nav-logo">✉</span>
      <span>axymail-gateway</span>
      <span class="nav-badge">admin</span>
    </a>
    <div class="nav-tabs">
      <a href="/admin/" class="nav-tab {% if active_tab == 'accounts' %}active{% endif %}">Accounts</a>
      <a href="/admin/providers" class="nav-tab {% if active_tab == 'providers' %}active{% endif %}">OAuth Providers</a>
    </div>
  </div>
  <div class="nav-right">
    <a href="/admin/logout" class="btn btn-ghost btn-sm">Sign out</a>
  </div>
</nav>
{% endblock %}

<main class="container">
  {% block content %}{% endblock %}
</main>

<script>
  function togglePanel(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle('open');
  }
  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }
</script>
</body>
</html>
