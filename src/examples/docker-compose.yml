version: "3.9"

services:
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
      - "1143:1143"   # IMAP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  axymail-gateway:
    build: ../..
    ports:
      - "3000:3000"
    environment:
      ENCRYPTION_KEY: "dev-key-replace-in-production"
      SECRET_KEY: "dev-session-key-replace-in-production"
      DB_PATH: "/data/axymail_gateway.db"
      ADMIN_API_KEY: "changeme"

      # ── Content guard (LLM Guard API) ────────────────────────────────────
      # GUARD_ENABLED: "true"
      # GUARD_SERVICE_URL: "https://llmguard.axgot.tools"
      # GUARD_TIMEOUT: "10"
      # GUARD_FAIL_MODE: "open"
      PROMETHEUS_ENABLED: "true"
      OTEL_ENABLED: "false"
    volumes:
      - gateway_data:/data
    depends_on:
      - mailpit
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Optional: OpenTelemetry Collector + Prometheus + Grafana ──────────────
  # Uncomment to run the full observability stack locally.

  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:latest
  #   ports:
  #     - "4318:4318"   # OTLP HTTP
  #     - "4317:4317"   # OTLP gRPC
  #   volumes:
  #     - ./otel-collector.yaml:/etc/otelcol/config.yaml

  # prometheus:
  #   image: prom/prometheus:latest
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yaml:/etc/prometheus/prometheus.yml

  # grafana:
  #   image: grafana/grafana:latest
  #   ports:
  #     - "3001:3000"
  #   environment:
  #     GF_SECURITY_ADMIN_PASSWORD: "admin"

volumes:
  gateway_data:
